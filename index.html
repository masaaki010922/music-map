<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Relationship Map</title>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="data.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    header {
      padding: 24px 32px 12px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0;
      color: #666;
      line-height: 1.6;
    }

    .controls {
      padding: 12px 32px 16px;
    }

    button {
      font-size: 14px;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: white;
      cursor: pointer;
    }

    button:hover {
      background: #f0f0f0;
    }

    #chart {
      position: relative;
      width: 100%;
      height: 75vh;
      background: #ffffff;
      border-top: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      overflow: hidden;
      cursor: grab;
    }

    #chart:active {
      cursor: grabbing;
    }

    .zoom-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .zoom-controls button {
      width: 36px;
      height: 36px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .zoom-controls .reset-button {
      width: 58px;
      font-size: 12px;
    }

    .node {
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .node circle {
      fill: white;
      stroke: #222;
      stroke-width: 1.5;
      transition: stroke-width 0.15s, r 0.15s;
    }

    .node text {
      paint-order: stroke;
      stroke: white;
      stroke-width: 4px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .album-title {
      font-size: 13px;
      font-weight: 600;
      fill: #222;
    }

    .album-meta {
      font-size: 11px;
      font-weight: 400;
      fill: #555;
    }

    .link {
      fill: none;
      stroke: #999;
      stroke-width: 1.6;
      opacity: 0.8;
    }

    .link.mutual {
      stroke-width: 2.4;
      stroke-dasharray: 6 4;
    }

    .year-line {
      stroke: #e0e0e0;
      stroke-width: 1;
    }

    .year-label {
      font-size: 12px;
      fill: #777;
    }

    .tooltip {
      position: fixed;
      display: none;
      max-width: 280px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      pointer-events: none;
      z-index: 10;
    }

    .legend {
      padding: 12px 32px 24px;
      color: #666;
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>

<body>
  <header>
    <h1>Music Relationship Map</h1>
    <p>アルバム同士の影響関係を、リリース年に沿って配置する音楽相関図。</p>
  </header>

  <div class="controls">
    <button id="restartButton">配置を再計算</button>
  </div>

  <div id="chart">
    <div class="zoom-controls">
      <button id="zoomInButton" title="拡大">＋</button>
      <button id="zoomOutButton" title="縮小">−</button>
      <button id="zoomResetButton" class="reset-button" title="リセット">100%</button>
    </div>
  </div>

  <div class="legend">
    横軸：リリース年、5年刻み ／ 縦方向：自動配置<br>
    矢印：一方的な影響 ／ 破線：相互に影響を与え合った関係<br>
    アルバムにカーソルを合わせると、同じアーティストの作品だけを濃く表示します。線と矢印は強調しません。<br>
    トラックパッド／マウスホイールで拡大縮小、背景ドラッグでマップを移動できます。
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    const chart = document.getElementById("chart");
    const tooltip = document.getElementById("tooltip");

    const width = chart.clientWidth;
    const height = chart.clientHeight;

    const margin = {
      top: 48,
      right: 80,
      bottom: 56,
      left: 80
    };

    const svg = d3.select("#chart")
      .append("svg")
      .attr("width", width)
      .attr("height", height);

    const viewport = svg.append("g")
      .attr("class", "viewport");

    const minYear = d3.min(nodes, d => d.year);
    const maxYear = d3.max(nodes, d => d.year);

    const startYear = Math.floor(minYear / 5) * 5;
    const endYear = Math.ceil(maxYear / 5) * 5;

    const xScale = d3.scaleLinear()
      .domain([startYear, endYear])
      .range([margin.left, width - margin.right]);

    const years = d3.range(startYear, endYear + 1, 5);

    viewport.selectAll(".year-line")
      .data(years)
      .enter()
      .append("line")
      .attr("class", "year-line")
      .attr("x1", d => xScale(d))
      .attr("x2", d => xScale(d))
      .attr("y1", margin.top)
      .attr("y2", height - margin.bottom);

    viewport.selectAll(".year-label")
      .data(years)
      .enter()
      .append("text")
      .attr("class", "year-label")
      .attr("x", d => xScale(d))
      .attr("y", height - 24)
      .attr("text-anchor", "middle")
      .text(d => d);

    svg.append("defs")
      .append("marker")
      .attr("id", "arrow")
      .attr("viewBox", "0 -5 10 10")
      .attr("refX", 22)
      .attr("refY", 0)
      .attr("markerWidth", 7)
      .attr("markerHeight", 7)
      .attr("orient", "auto")
      .append("path")
      .attr("d", "M0,-5L10,0L0,5")
      .attr("fill", "#999");

    const nodeData = nodes.map(d => ({ ...d }));
    const linkData = links.map(d => ({ ...d }));

    const link = viewport.append("g")
      .selectAll("path")
      .data(linkData)
      .enter()
      .append("path")
      .attr("class", d => `link ${d.type}`)
      .attr("marker-end", d => d.type === "oneway" ? "url(#arrow)" : null);

    const node = viewport.append("g")
      .selectAll(".node")
      .data(nodeData)
      .enter()
      .append("g")
      .attr("class", "node")
      .call(
        d3.drag()
          .on("start", dragStarted)
          .on("drag", dragged)
          .on("end", dragEnded)
      );

    node.append("circle")
      .attr("r", 10);

    node.append("text")
      .attr("x", 14)
      .attr("y", -2)
      .each(function(d) {
        const text = d3.select(this);

        text.append("tspan")
          .attr("class", "album-title")
          .attr("x", 14)
          .attr("dy", 0)
          .text(d.title);

        text.append("tspan")
          .attr("class", "album-meta")
          .attr("x", 14)
          .attr("dy", 16)
          .text(`${d.artist} / ${d.year}`);
      });

    node
      .on("mousemove", (event, d) => {
        highlightArtist(d.artist);

        tooltip.style.display = "block";
        tooltip.style.left = `${event.clientX + 14}px`;
        tooltip.style.top = `${event.clientY + 14}px`;
        tooltip.innerHTML = `
          <strong>${d.title}</strong><br>
          ${d.artist}<br>
          ${d.year} / ${d.genre}
        `;
      })
      .on("mouseleave", () => {
        resetHighlight();
        tooltip.style.display = "none";
      });

    link
      .on("mousemove", (event, d) => {
        tooltip.style.display = "block";
        tooltip.style.left = `${event.clientX + 14}px`;
        tooltip.style.top = `${event.clientY + 14}px`;
        tooltip.innerHTML = `
          <strong>${d.type === "oneway" ? "一方的な影響" : "相互関係"}</strong><br>
          ${d.note}
        `;
      })
      .on("mouseleave", () => {
        tooltip.style.display = "none";
      });

    const simulation = d3.forceSimulation(nodeData)
      .force("link", d3.forceLink(linkData)
        .id(d => d.id)
        .distance(145)
        .strength(0.45)
      )
      .force("x", d3.forceX(d => xScale(d.year)).strength(1.0))
      .force("y", d3.forceY(height / 2).strength(0.08))
      .force("charge", d3.forceManyBody().strength(-260))
      .force("collide", d3.forceCollide().radius(70).strength(1))
      .on("tick", ticked);

    function ticked() {
      link.attr("d", d => {
        const dr = d.type === "mutual" ? 40 : 0;
        return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
      });

      node.attr("transform", d => {
        d.x = Math.max(margin.left, Math.min(width - margin.right, d.x));
        d.y = Math.max(margin.top, Math.min(height - margin.bottom, d.y));
        return `translate(${d.x},${d.y})`;
      });
    }

    function highlightArtist(artist) {
      node.style("opacity", d => d.artist === artist ? 1 : 0.25);

      node.select("circle")
        .attr("r", d => d.artist === artist ? 11 : 10)
        .style("stroke-width", d => d.artist === artist ? 3 : 1.5);

      node.selectAll(".album-title")
        .style("font-weight", d => d.artist === artist ? 700 : 600);

      node.selectAll(".album-meta")
        .style("font-weight", d => d.artist === artist ? 600 : 400);
    }

    function resetHighlight() {
      node.style("opacity", 1);

      node.select("circle")
        .attr("r", 10)
        .style("stroke-width", 1.5);

      node.selectAll(".album-title")
        .style("font-weight", 600);

      node.selectAll(".album-meta")
        .style("font-weight", 400);
    }

    function dragStarted(event, d) {
      if (event.sourceEvent) {
        event.sourceEvent.stopPropagation();
      }

      if (!event.active) simulation.alphaTarget(0.3).restart();

      d.fx = d.x;
      d.fy = d.y;
    }

    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }

    function dragEnded(event, d) {
      if (!event.active) simulation.alphaTarget(0);

      d.fx = null;
      d.fy = null;
    }

    const zoom = d3.zoom()
      .scaleExtent([0.45, 4])
      .on("zoom", event => {
        viewport.attr("transform", event.transform);
      });

    svg.call(zoom);

    document.getElementById("zoomInButton").addEventListener("click", () => {
      svg.transition()
        .duration(220)
        .call(zoom.scaleBy, 1.25);
    });

    document.getElementById("zoomOutButton").addEventListener("click", () => {
      svg.transition()
        .duration(220)
        .call(zoom.scaleBy, 0.8);
    });

    document.getElementById("zoomResetButton").addEventListener("click", () => {
      svg.transition()
        .duration(220)
        .call(zoom.transform, d3.zoomIdentity);
    });

    document.getElementById("restartButton").addEventListener("click", () => {
      nodeData.forEach(d => {
        d.fx = null;
        d.fy = null;
      });

      simulation.alpha(1).restart();
    });
  </script>
</body>
</html>
